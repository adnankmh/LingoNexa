name: Flutter CI - APK - AAB - Web

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: lingonexa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Verify Flutter SDK
        run: flutter --version
      - name: Complete platform scaffolding
        run: |
          flutter create --platforms=android,web --org com.lingonexa .
          git checkout -- android web
      - name: Flutter pub get
        run: flutter pub get
      - name: Format sources
        run: dart format lib test
      - name: Analyze Flutter project
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - name: Run Flutter tests
        run: flutter test

  build:
    needs: quality
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Verify Flutter SDK
        run: flutter --version
      - name: Complete platform scaffolding
        run: |
          flutter create --platforms=android,web --org com.lingonexa .
          git checkout -- android web
      - name: Flutter pub get
        run: flutter pub get
      - name: Configure Play upload signing
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=upload-keystore.jks\n' "$ANDROID_STORE_PASSWORD" "$ANDROID_KEY_PASSWORD" "$ANDROID_KEY_ALIAS" > android/key.properties
      - name: Build APK
        run: flutter build apk --release
      - name: Build AAB
        run: flutter build appbundle --release
      - name: Build Web
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"
      - uses: actions/upload-artifact@v4
        with:
          name: lingonexa-android
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy-pages:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

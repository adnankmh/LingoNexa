name: Deploy GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-pages:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.pages.outputs.enabled }}
    steps:
      - name: Check whether GitHub Pages is enabled
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status=$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pages")
          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=GitHub Pages is not enabled::Open Settings > Pages, select GitHub Actions, save, then run this workflow again."
          fi

  build-pages:
    needs: check-pages
    if: needs.check-pages.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Prepare Flutter project
        run: bash scripts/ci_prepare.sh
      - name: Build Pages site
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/web

  deploy-pages:
    needs: build-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

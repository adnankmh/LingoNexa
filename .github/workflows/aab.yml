name: AAB

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-aab:
    runs-on: ubuntu-latest
    concurrency:
      group: aab-${{ github.ref }}
      cancel-in-progress: true
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Prepare Flutter project
        run: bash scripts/ci_prepare.sh
      - name: Configure Play upload signing
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=upload-keystore.jks\n' "$ANDROID_STORE_PASSWORD" "$ANDROID_KEY_PASSWORD" "$ANDROID_KEY_ALIAS" > android/key.properties
      - name: Build release AAB
        run: flutter build appbundle --release
      - name: Upload AAB
        uses: actions/upload-artifact@v7
        with:
          name: lingonexa-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

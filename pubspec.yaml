name: lingonexa
description: LingoNexa - an original, offline-first multilingual learning platform.
publish_to: "none"
version: 1.4.0+9

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  lottie: ^3.3.1
  url_launcher: ^6.3.2
  flutter_tts: ^4.2.5
  speech_to_text: ^7.4.0
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/data/
    - assets/branding/
